<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product review form for WDD 131 by Bryan Nuñez.">
    <meta name="author" content="Bryan Nuñez">
    <title>WDD 131 – Product Review – Bryan Nuñez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <div class="field">
                <label for="product">Product Name <span class="required">*</span></label>
                <select id="product" name="product" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <fieldset class="field">
                <legend>Overall Rating <span class="required">*</span></legend>
                <div class="rating">
                    <div class="star-option">
                        <label for="rating1">&#9734;</label>
                        <input type="radio" id="rating1" name="rating" value="1" required>
                    </div>
                    <div class="star-option">
                        <label for="rating2">&#9734;&#9734;</label>
                        <input type="radio" id="rating2" name="rating" value="2" required>
                    </div>
                    <div class="star-option">
                        <label for="rating3">&#9734;&#9734;&#9734;</label>
                        <input type="radio" id="rating3" name="rating" value="3" required>
                    </div>
                    <div class="star-option">
                        <label for="rating4">&#9734;&#9734;&#9734;&#9734;</label>
                        <input type="radio" id="rating4" name="rating" value="4" required>
                    </div>
                    <div class="star-option">
                        <label for="rating5">&#9734;&#9734;&#9734;&#9734;&#9734;</label>
                        <input type="radio" id="rating5" name="rating" value="5" required>
                    </div>
                </div>
            </fieldset>

            <div class="field">
                <label for="installdate">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installdate" name="installdate" required>
            </div>

            <fieldset class="field">
                <legend>Which features did you find useful in the product?<br><em>(Check all that apply)</em></legend>
                <label class="checkbox-label" for="durability">
                    <input type="checkbox" id="durability" name="features" value="durability">
                    Durability
                </label>
                <label class="checkbox-label" for="ease-of-use">
                    <input type="checkbox" id="ease-of-use" name="features" value="ease-of-use">
                    Ease of Use
                </label>
                <label class="checkbox-label" for="performance">
                    <input type="checkbox" id="performance" name="features" value="performance">
                    Performance
                </label>
                <label class="checkbox-label" for="design">
                    <input type="checkbox" id="design" name="features" value="design">
                    Design
                </label>
            </fieldset>

            <div class="field">
                <label for="review">Written Review <span class="optional">(Optional)</span></label>
                <textarea id="review" name="review" rows="5"></textarea>
            </div>

            <div class="field">
                <label for="username">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="username" name="username">
            </div>

            <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> Bryan Nuñez | Cancún, México</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
